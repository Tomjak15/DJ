services:
  - type: web
    name: abw-online-os
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm --prefix backend install
    startCommand: npm --prefix backend run migrate && npm --prefix backend start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: abw-online-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: API_URL
        value: https://abw-online-os.onrender.com
      - key: CORS_ORIGIN
        value: https://abw1.onrender.com

databases:
  - name: abw-online-db
    plan: free
    region: frankfurt
    databaseName: abw_os
    user: abw_os
    postgresMajorVersion: "18"
    ipAllowList: []
